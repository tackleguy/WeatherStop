<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="80%" stop-color="#0f1e2e"/>
      <stop offset="100%" stop-color="#06090f"/>
    </radialGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="55%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- sun glow -->
  <circle cx="256" cy="220" r="170" fill="rgba(253,224,71,0.18)"/>
  <!-- sun rays -->
  <g stroke="rgba(253,224,71,0.85)" stroke-width="11" stroke-linecap="round">
    <line x1="256" y1="60"  x2="256" y2="110"/>
    <line x1="256" y1="330" x2="256" y2="380"/>
    <line x1="92"  y1="220" x2="142" y2="220"/>
    <line x1="370" y1="220" x2="420" y2="220"/>
    <line x1="138" y1="102" x2="172" y2="136"/>
    <line x1="340" y1="304" x2="374" y2="338"/>
    <line x1="138" y1="338" x2="172" y2="304"/>
    <line x1="340" y1="136" x2="374" y2="102"/>
  </g>
  <!-- sun body -->
  <circle cx="256" cy="220" r="78" fill="url(#sun)"/>
  <!-- cloud -->
  <g fill="rgba(244,246,251,0.96)">
    <ellipse cx="190" cy="380" rx="80" ry="34"/>
    <ellipse cx="260" cy="360" rx="80" ry="44"/>
    <ellipse cx="338" cy="380" rx="74" ry="32"/>
    <ellipse cx="260" cy="392" rx="120" ry="22"/>
  </g>
</svg>
